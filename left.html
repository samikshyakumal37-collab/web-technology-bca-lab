<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fishes</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #d8f0f0;
            color: #004d40;
        }
        .container {
            padding: 16px;
        }
        h1 {
            margin-top: 0;
            font-size: 20px;
            color: #2a7f7f;
            text-shadow: 1px 1px white;
        }
        ol {
            margin: 8px 0 0 18px;
        }
        li {
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fishes</h1>
        <ol>
            <li>Guppy fish</li>
            <li>Angel fish</li>
            <li>Gold fish</li>
            <li>Molly fish</li>
        </ol>
    </div>
</body>
</html>
