<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navbar Example</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
    }

    /* Navbar container */
    .navbar {
        background-color: yellow;
        padding: 10px;
        display: flex;
        justify-content: center;
    }

    /* Menu list */
    .navbar ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
    }

    /* Menu items */
    .navbar ul li {
        padding: 0 15px;
        position: relative;
    }

    /* Separator line */
    .navbar ul li:not(:last-child)::after {
        content: "";
        position: absolute;
        right: 0;
        top: 5px;
        height: 20px;
        width: 2px;
        background-color: black;
    }

    /* Links */
    .navbar ul li a {
        text-decoration: none;
        color: purple;
        font-size: 18px;
    }

    /* Active Home button */
    .navbar ul li a.active {
        background-color: blueviolet;
        color: white;
        padding: 5px 10px;
        border-radius: 3px;
    }
</style>
</head>

<body>

<div class="navbar">
    <ul>
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

</body>
</html>
