<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Caption</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ff4dab;
            color: white;
            text-align: center;
        }
        .caption {
            padding: 16px 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            font-size: 18px;
        }
        .text {
            padding: 0 12px;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="caption">CAPTION</div>
    <div class="text">You can read a short comment about the figure in this box click the caption in the top frame</div>
</body>
</html>
